version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: fittrack_db
    environment:
      POSTGRES_DB: fittrack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: fittrack_secret_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    build: ./fittrack-backend
    container_name: fittrack_backend
    command: >
      sh -c "python manage.py makemigrations &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./fittrack-backend:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-fittrack-ai-super-secret-key-change-in-prod
      # In production, swap SQLite settings for PostgreSQL connection strings:
      # - DATABASE_URL=postgres://postgres:fittrack_secret_password@db:5432/fittrack
    depends_on:
      - db
    restart: always

  frontend:
    build: ./fittrack-frontend
    container_name: fittrack_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./fittrack-frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
